<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiM — Brand Identity Review</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F1EF;--surface:#ECEAE6;--border:rgba(30,30,28,0.12);--border-md:rgba(30,30,28,0.22);
  --charcoal:#1e1e1c;--primary:#5F7C82;--primary-lt:rgba(95,124,130,0.1);--silver:#a3a3a5;
  --teal:#1AD9C7;--danger:#C0392B;--danger-lt:rgba(192,57,43,0.08);
  --warn:#B7860B;--warn-lt:rgba(183,134,11,0.08);--ok:#2E7D52;--ok-lt:rgba(46,125,82,0.08);
}
body{font-family:'IBM Plex Sans Arabic','IBM Plex Sans',sans-serif;background:var(--bg);color:var(--charcoal);min-height:100vh;direction:rtl}

/* HEADER */
.hdr{background:var(--charcoal);height:52px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:.5px solid rgba(255,255,255,.06)}
.hdr-brand{display:flex;align-items:center;gap:14px}
.hdr-title{font-size:13px;font-weight:500;color:rgba(240,240,242,.9)}
.hdr-sub{font-size:10px;color:rgba(163,163,165,.45);letter-spacing:.04em;margin-top:1px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px rgba(26,217,199,.4)}

/* LAYOUT */
.app{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{background:var(--surface);border-left:.5px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.lbl{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--silver)}
.rule{height:.5px;background:var(--border)}

/* upload */
.drop{border:1.5px dashed var(--border-md);background:var(--bg);padding:20px 14px;text-align:center;cursor:pointer;position:relative;transition:.2s}
.drop:hover,.drop.over{border-color:var(--primary);background:var(--primary-lt)}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:22px;margin-bottom:7px;opacity:.35;display:block}
.drop-txt{font-size:11px;color:var(--silver);line-height:1.6}
.drop-txt strong{color:var(--primary)}
.prev-wrap{display:none;background:#141416;position:relative;min-height:130px;align-items:center;justify-content:center;margin-top:8px}
.prev-wrap img{max-width:100%;max-height:170px;object-fit:contain}
.prev-del{position:absolute;top:6px;left:6px;background:rgba(192,57,43,.85);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.fname{font-size:10px;color:var(--silver);text-align:center;margin-top:4px}

/* fields */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;color:var(--silver)}
.inp{width:100%;padding:8px 10px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:11.5px;border:.5px solid var(--border-md);background:var(--bg);color:var(--charcoal);direction:rtl}
.inp:focus{outline:none;border-color:var(--primary)}
select.inp{cursor:pointer}

/* run btn */
.run-btn{background:var(--charcoal);color:#fff;border:none;padding:12px;font-size:13px;font-weight:500;cursor:pointer;width:100%;font-family:'IBM Plex Sans Arabic',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.run-btn:hover:not(:disabled){background:#2d2d2b}
.run-btn:disabled{opacity:.35;cursor:not-allowed}
.run-btn.loading{background:var(--primary)}

/* MAIN */
.main{padding:24px 32px;height:calc(100vh - 52px);overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:.3;padding:80px 0}
.empty-icon{font-size:42px}
.empty-txt{font-size:13px;color:var(--silver);text-align:center;line-height:1.8}

/* results */
.res-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:16px;border-bottom:.5px solid var(--border)}
.res-title{font-size:15px;font-weight:600}
.res-meta{font-size:10px;color:var(--silver);margin-top:3px;line-height:1.6}
.design-prev{background:#141416;border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding:20px;min-height:160px}
.design-prev img{max-width:100%;max-height:320px;object-fit:contain}

/* thinking */
.thinking{background:var(--primary-lt);border:.5px solid rgba(95,124,130,.2);padding:14px 16px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--primary)}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--primary);margin:0 2px;animation:bounce 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* summary */
.summary{padding:14px 16px;border:.5px solid}
.sum-counts{font-size:12px;font-weight:600;margin-bottom:5px}
.sum-txt{font-size:12px;line-height:1.75;color:#333}

/* cards */
.sec-bar{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--silver);padding-bottom:8px;border-bottom:.5px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sec-ln{flex:1;height:.5px;background:var(--border)}
.cards{display:flex;flex-direction:column;gap:8px}
.card{border:.5px solid var(--border);background:#fff;overflow:hidden}
.card-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:.15s}
.card-hdr:hover{background:var(--bg)}
.card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--ok)}.dot-warn{background:var(--warn)}.dot-fail{background:var(--danger)}.dot-info{background:var(--silver)}
.card-title{font-size:12px;font-weight:500;flex:1}
.badge{font-size:9px;padding:2px 9px;letter-spacing:.07em;text-transform:uppercase;font-weight:600}
.b-ok{background:var(--ok-lt);color:var(--ok)}.b-warn{background:var(--warn-lt);color:var(--warn)}.b-fail{background:var(--danger-lt);color:var(--danger)}.b-info{background:var(--primary-lt);color:var(--primary)}
.badge-en{font-size:8px;padding:2px 7px;letter-spacing:.06em;text-transform:uppercase;font-weight:500;font-family:'IBM Plex Sans',sans-serif}
.card-chev{font-size:10px;color:var(--silver);transition:transform .2s;flex-shrink:0}
.card-body{display:none;border-top:.5px solid var(--border);background:#FAFAFA}
.card-body.open{display:block}
.card-note{padding:12px 16px;font-size:12px;line-height:1.85;color:#2a2a28;border-bottom:.5px solid var(--border)}
.card-note-en{padding:10px 16px;font-size:11px;line-height:1.8;color:#555;font-family:'IBM Plex Sans',sans-serif;direction:ltr;text-align:left;background:var(--bg)}
.card-detail{padding:8px 16px;font-size:10.5px;color:#777;font-family:monospace;direction:ltr;text-align:left;background:#F5F4F2;border-top:.5px solid var(--border)}
.gen-box{padding:12px 16px;background:#fff;border:.5px solid var(--border);font-size:12px;line-height:1.85;color:#333}
.gen-box-en{padding:10px 16px;background:var(--bg);border:.5px solid var(--border);border-top:none;font-size:11px;line-height:1.8;color:#555;font-family:'IBM Plex Sans',sans-serif;direction:ltr;text-align:left}

/* pdf btn */
.pdf-btn{background:var(--primary);color:#fff;border:none;padding:10px 20px;font-size:12px;font-weight:500;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;display:flex;align-items:center;gap:8px;transition:.2s}
.pdf-btn:hover{background:#4a6068}
.pdf-btn:disabled{opacity:.4;cursor:not-allowed}
.spinner{width:13px;height:13px;border:1.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:2px}
@media(max-width:720px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.main{height:auto}}
</style>
</head>
<body>

<!-- !! غيّر هذا الرابط برابط الـ Worker الخاص بك بعد النشر !! -->
<script>
var WORKER_URL = 'https://mim-brand-review.USERNAME.workers.dev';
</script>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <svg width="44" height="13" viewBox="0 0 231.12 65.83" style="opacity:.75">
      <defs>
        <linearGradient id="g1" x1="45.56" y1="-120.31" x2="133.07" y2="50.34" gradientTransform="translate(118.32 127.42) rotate(3)" gradientUnits="userSpaceOnUse">
          <stop offset=".03" stop-color="#4e4d4d"/><stop offset=".77" stop-color="#c6c5c5"/><stop offset="1" stop-color="#c8c7c7"/>
        </linearGradient>
        <linearGradient id="g2" x1="104.56" y1="-87.76" x2="19.35" y2="-138.1" gradientTransform="translate(118.32 127.42) rotate(3)" gradientUnits="userSpaceOnUse">
          <stop offset=".03" stop-color="#676767"/><stop offset=".67" stop-color="#bbb"/><stop offset="1" stop-color="#868b8f"/>
        </linearGradient>
      </defs>
      <path style="fill:url(#g1)" d="M210.92,64.91c-.17.06-.39.15-.67.24l-.69.22-.54.15-.25.06-.26.06-.3,0-.39.06c-4.58.5-17.41-1.42-25.35-5.09l-.34-.16-.35-.17a18.11,18.11,0,0,1-5.55-4.3c-5.48-6.82-12.11-23.32-12-32.78v0a9.79,9.79,0,0,1,1.43-4.39l.1-.15.2-.32a19.86,19.86,0,0,1,5.7-5.58c2.57,12.72,11,31.71,22.62,43.52.4.4.8.8,1.21,1.19s1.06,1,1.6,1.52l.78.71.53.45.44.38c.56.47,1.13.91,1.7,1.34,0,0,.25.19.69.49.26.18.58.39,1,.61C204.35,64.3,208,66,210.92,64.91Z"/>
      <path style="fill:url(#g2)" d="M231.09,36.05V36l0,.18c-.31,2.15-2.52,4.54-5.81,6.91a59.87,59.87,0,0,1-14.85-8c-12.35-8.93-20.28-23.77-30.66-24.53a13.36,13.36,0,0,0-8.13,2.25,19.73,19.73,0,0,0-5.7,5.58l-.2.32-.1.14a9.82,9.82,0,0,0-1.43,4.4c0-.38,0-.85.1-1.36c1.47-10,11.94-21.49,20.43-21.26,10.29.28,19.09,12.54,27.08,19.92,6.85,6.32,12.38,9,15.86,11.26h0c2.25,1.44,3.5,2.73,3.37,4.8Z"/>
    </svg>
    <div>
      <div class="hdr-title">أداة مراجعة الهوية البصرية · Brand Identity Review</div>
      <div class="hdr-sub">Ministry of Industry and Mineral Resources · MiM</div>
    </div>
  </div>
  <div class="dot"></div>
</div>

<!-- APP -->
<div class="app">
  <div class="sidebar">

    <div>
      <div class="lbl" style="margin-bottom:8px">رفع التصميم · Upload</div>
      <div class="drop" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
        <span class="drop-icon">⬆</span>
        <div class="drop-txt"><strong>ارفع التصميم</strong><br>PNG · JPG · WEBP</div>
      </div>
      <div class="prev-wrap" id="prevWrap">
        <img id="prevImg" src="" alt="">
        <button class="prev-del" onclick="removeFile()">×</button>
      </div>
      <div class="fname" id="fname"></div>
    </div>

    <div class="rule"></div>

    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="lbl">بيانات المراجعة</div>
      <div class="field">
        <label>اسم المراجع · Reviewer</label>
        <input class="inp" id="rname" type="text" placeholder="الاسم الكامل">
      </div>
      <div class="field">
        <label>اسم المشروع · Project</label>
        <input class="inp" id="pname" type="text" placeholder="مثال: حملة رمضان 2025">
      </div>
      <div class="field">
        <label>نوع التصميم · Type</label>
        <select class="inp" id="dtype">
          <option>سوشيال ميديا</option>
          <option>مطبوعات</option>
          <option>لافتة / خارجي</option>
          <option>رقمي / ويب</option>
          <option>عروض تقديمية</option>
          <option>أخرى</option>
        </select>
      </div>
    </div>

    <div class="rule"></div>

    <div class="field">
      <label class="lbl" style="margin-bottom:6px">ملاحظات إضافية · Notes</label>
      <textarea class="inp" id="extraNote" style="min-height:60px;resize:vertical;line-height:1.6" placeholder="أي سياق خاص بهذا التصميم..."></textarea>
    </div>

    <div class="rule"></div>

    <button class="run-btn" id="runBtn" onclick="runReview()" disabled>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg>
      تشغيل المراجعة · Review
    </button>

  </div>

  <div class="main" id="main">
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-txt">ارفع التصميم وأدخل البيانات<br>ثم اضغط «تشغيل المراجعة»<br><br>Upload design and press Review</div>
    </div>
  </div>
</div>

<script>
var imgSrc=null,imgFile=null,reviewData=null,isLoading=false;

var PROMPT=`You are the Brand Identity Officer at the Ministry of Industry and Mineral Resources (MiM), Saudi Arabia.

BRAND GUIDELINES:
1. LOGO: Always top-right. MAIN (full: icon+Arabic+English) or FLAT (single-color). Safe margins required. Never distort or flip.
2. COLORS (exact hex): #1A1A1A darkest grey (dominant ~75%), #666666 dark grey, #B3B3B3 medium grey, #E6E6E6 light grey, #1AD9C7 teal accent (~5%), #413258 purple accent (~10%), #BFA19F mauve accent (~5%). Any other color = violation.
3. TYPOGRAPHY: Lyon Arabic = H1 headlines ONLY. Diodrum = H2 + body + captions. Any other typeface = violation.
4. HEIGHT MAP / EYE FLOW: Primary focus = main headline. Logo must not visually compete with content. RTL flow (right→left, top→bottom).
5. SPACING: Equal margins, grid alignment, no crowding or overlap.
6. VISUAL HIERARCHY: Clear H1>H2>Body size/weight progression.
7. BRAND CONSISTENCY: Institutional professional tone, no foreign elements.

Return ONLY valid JSON, no text outside:
{"summary_ar":"ملخص بالعربي","summary_en":"Summary in English","reviews":[{"id":"logo","title_ar":"الشعار","title_en":"Logo","status":"pass|fail|warn|info","note_ar":"ملاحظة بالعربي","note_en":"Note in English","detail":"optional technical detail"},{"id":"colors","title_ar":"الألوان","title_en":"Colors","status":"...","note_ar":"...","note_en":"...","detail":"..."},{"id":"typography","title_ar":"الخطوط","title_en":"Typography","status":"...","note_ar":"...","note_en":"...","detail":"..."},{"id":"heatmap","title_ar":"تركيز العين","title_en":"Eye Flow","status":"...","note_ar":"...","note_en":"...","detail":"..."},{"id":"spacing","title_ar":"المسافات","title_en":"Spacing","status":"...","note_ar":"...","note_en":"...","detail":"..."},{"id":"hierarchy","title_ar":"التسلسل البصري","title_en":"Hierarchy","status":"...","note_ar":"...","note_en":"...","detail":"..."},{"id":"consistency","title_ar":"الاتساق","title_en":"Consistency","status":"...","note_ar":"...","note_en":"...","detail":"..."}],"general_ar":"","general_en":""}
Be precise and direct. No scores.`;

function handleFile(e){
  var f=e.target.files[0];if(!f)return;
  imgFile=f;
  var r=new FileReader();
  r.onload=function(ev){
    imgSrc=ev.target.result;
    document.getElementById('prevImg').src=imgSrc;
    document.getElementById('prevWrap').style.display='flex';
    document.getElementById('dropZone').style.display='none';
    document.getElementById('fname').textContent=f.name;
    if(!document.getElementById('pname').value)
      document.getElementById('pname').value=f.name.replace(/\.[^.]+$/,'');
    document.getElementById('runBtn').disabled=false;
  };
  r.readAsDataURL(f);
}

function removeFile(){
  imgSrc=null;imgFile=null;
  document.getElementById('prevWrap').style.display='none';
  document.getElementById('dropZone').style.display='block';
  document.getElementById('fname').textContent='';
  document.getElementById('fileInput').value='';
  document.getElementById('runBtn').disabled=true;
  document.getElementById('main').innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">ارفع التصميم وأدخل البيانات<br>ثم اضغط «تشغيل المراجعة»<br><br>Upload design and press Review</div></div>';
}

var dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('over')});
dz.addEventListener('dragleave',function(){dz.classList.remove('over')});
dz.addEventListener('drop',function(e){
  e.preventDefault();dz.classList.remove('over');
  var f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))handleFile({target:{files:[f]}});
});

async function runReview(){
  if(!imgSrc||isLoading)return;
  isLoading=true;
  var btn=document.getElementById('runBtn');
  btn.disabled=true;btn.classList.add('loading');
  btn.innerHTML='<div class="spinner"></div> جاري التحليل...';

  var project=document.getElementById('pname').value||'—';
  var reviewer=document.getElementById('rname').value||'—';
  var dtype=document.getElementById('dtype').value;
  var extra=document.getElementById('extraNote').value;
  var now=new Date();
  var dateAr=now.toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'});
  var dateEn=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var timeStr=now.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});

  var main=document.getElementById('main');
  main.innerHTML=
    '<div class="res-hdr"><div><div class="res-title">'+project+'</div>'
    +'<div class="res-meta">'+dateAr+' · '+timeStr+' · '+dtype+' · المراجع: '+reviewer+'</div></div></div>'
    +'<div class="design-prev"><img src="'+imgSrc+'" alt=""></div>'
    +'<div class="thinking" id="tb"><div class="dots"><span></span><span></span><span></span></div>'
    +'<span>يتم تحليل التصميم وفق معايير الهوية البصرية...</span></div>';

  var userTxt=PROMPT+'\n\nDesign type: '+dtype+'\nProject: '+project+'\nReviewer: '+reviewer
    +(extra?'\nNotes: '+extra:'');

  try{
    var b64=imgSrc.split(',')[1];
    var mime=imgFile.type||'image/jpeg';

    var resp=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:2500,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mime,data:b64}},
            {type:'text',text:userTxt}
          ]
        }]
      })
    });

    if(!resp.ok){var e=await resp.json();throw new Error(e.error?.message||resp.statusText)}
    var data=await resp.json();
    var txt=data.content?.find(function(b){return b.type==='text'})?.text||'';
    var result=JSON.parse(txt.replace(/```json|```/g,'').trim());
    reviewData={result,project,reviewer,dtype,dateAr,dateEn,timeStr};
    renderResults(result,project,reviewer,dtype,dateAr,timeStr);
  }catch(err){
    document.getElementById('tb')?.remove();
    main.innerHTML+='<div style="background:var(--danger-lt);border:.5px solid rgba(192,57,43,.2);padding:14px 16px;font-size:12px;color:var(--danger);line-height:1.7"><strong>خطأ · Error:</strong> '+err.message+'</div>';
  }

  isLoading=false;btn.disabled=false;btn.classList.remove('loading');
  btn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg> إعادة التحليل · Re-review';
}

var SC={pass:{dot:'dot-ok',b:'b-ok',ar:'مطابق',en:'Pass'},fail:{dot:'dot-fail',b:'b-fail',ar:'مخالفة',en:'Fail'},warn:{dot:'dot-warn',b:'b-warn',ar:'تحذير',en:'Warning'},info:{dot:'dot-info',b:'b-info',ar:'ملاحظة',en:'Note'}};

function renderResults(r,project,reviewer,dtype,dateAr,timeStr){
  var main=document.getElementById('main');
  document.getElementById('tb')?.remove();
  var fails=r.reviews.filter(function(x){return x.status==='fail'}).length;
  var warns=r.reviews.filter(function(x){return x.status==='warn'}).length;
  var passes=r.reviews.filter(function(x){return x.status==='pass'}).length;
  var sc=fails>0?'var(--danger)':warns>0?'var(--warn)':'var(--ok)';
  var sbg=fails>0?'var(--danger-lt)':warns>0?'var(--warn-lt)':'var(--ok-lt)';
  var sbr=fails>0?'rgba(192,57,43,.2)':warns>0?'rgba(183,134,11,.2)':'rgba(46,125,82,.2)';

  var cards=r.reviews.map(function(rv,i){
    var s=SC[rv.status]||SC.info;
    var open=(rv.status==='fail'||i===0)?'open':'';
    return '<div class="card"><div class="card-hdr" onclick="toggleCard(this)">'
      +'<div class="card-dot '+s.dot+'"></div>'
      +'<div class="card-title">'+rv.title_ar+' · <span style="font-family:\'IBM Plex Sans\',sans-serif;font-weight:400;font-size:11px;color:var(--silver)">'+rv.title_en+'</span></div>'
      +'<div class="badge '+s.b+'">'+s.ar+'</div>'
      +'<div class="badge-en '+s.b+'" style="margin-right:4px">'+s.en+'</div>'
      +'<div class="card-chev">▾</div></div>'
      +'<div class="card-body '+open+'">'
      +'<div class="card-note">'+rv.note_ar+'</div>'
      +'<div class="card-note-en">'+rv.note_en+'</div>'
      +(rv.detail?'<div class="card-detail">'+rv.detail+'</div>':'')
      +'</div></div>';
  }).join('');

  var genHtml='';
  if(r.general_ar||r.general_en){
    genHtml='<div><div class="sec-bar">ملاحظات عامة · General Notes <div class="sec-ln"></div></div>'
      +(r.general_ar?'<div class="gen-box">'+r.general_ar+'</div>':'')
      +(r.general_en?'<div class="gen-box-en">'+r.general_en+'</div>':'')+'</div>';
  }

  main.innerHTML=
    '<div class="res-hdr"><div><div class="res-title">'+project+'</div>'
    +'<div class="res-meta">'+dateAr+' · '+timeStr+' · '+dtype+' · المراجع: '+reviewer+'</div></div>'
    +'<button class="pdf-btn" id="pdfBtn" onclick="exportPDF()">'
    +'<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 1v7M3 5.5L6 9l3-3.5"/><path d="M1 9.5v1a.5.5 0 00.5.5h9a.5.5 0 00.5-.5v-1"/></svg>'
    +'تصدير PDF · Export</button></div>'
    +'<div class="design-prev"><img src="'+imgSrc+'" alt=""></div>'
    +'<div class="summary" style="background:'+sbg+';border-color:'+sbr+'">'
    +'<div class="sum-counts" style="color:'+sc+'">'+fails+' مخالفة · '+warns+' تحذير · '+passes+' مطابق</div>'
    +'<div class="sum-txt">'+r.summary_ar+'</div>'
    +'<div class="sum-txt" style="font-family:\'IBM Plex Sans\',sans-serif;font-size:11px;color:#555;margin-top:5px;direction:ltr;text-align:left">'+r.summary_en+'</div>'
    +'</div>'
    +'<div><div class="sec-bar">نتائج المراجعة · Review Results <div class="sec-ln"></div></div>'
    +'<div class="cards">'+cards+'</div></div>'+genHtml;
}

function toggleCard(hdr){
  var body=hdr.nextElementSibling;
  var chev=hdr.querySelector('.card-chev');
  var open=body.classList.toggle('open');
  if(chev)chev.style.transform=open?'rotate(180deg)':'';
}

function exportPDF(){
  if(!reviewData)return;
  var btn=document.getElementById('pdfBtn');
  btn.disabled=true;btn.textContent='جاري التصدير...';
  var d=reviewData,r=d.result;
  var fails=r.reviews.filter(function(x){return x.status==='fail'}).length;
  var warns=r.reviews.filter(function(x){return x.status==='warn'}).length;
  var passes=r.reviews.filter(function(x){return x.status==='pass'}).length;
  var sc=fails>0?'#C0392B':warns>0?'#B7860B':'#2E7D52';
  var sbg=fails>0?'rgba(192,57,43,0.06)':warns>0?'rgba(183,134,11,0.06)':'rgba(46,125,82,0.06)';
  var sbr=fails>0?'rgba(192,57,43,0.25)':warns>0?'rgba(183,134,11,0.25)':'rgba(46,125,82,0.25)';
  var dc={pass:'#2E7D52',warn:'#B7860B',fail:'#C0392B',info:'#5F7C82'};
  var db={pass:'rgba(46,125,82,0.06)',warn:'rgba(183,134,11,0.06)',fail:'rgba(192,57,43,0.06)',info:'rgba(95,124,130,0.06)'};
  var dl={pass:{ar:'مطابق',en:'Pass'},warn:{ar:'تحذير',en:'Warning'},fail:{ar:'مخالفة',en:'Fail'},info:{ar:'ملاحظة',en:'Note'}};

  var crHtml=r.reviews.map(function(rv){
    var s=rv.status||'info',col=dc[s],bg=db[s];
    return '<div style="margin-bottom:18px;page-break-inside:avoid">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+col+';flex-shrink:0"></div>'
      +'<div style="flex:1"><span style="font-size:13px;font-weight:600">'+rv.title_ar+'</span>'
      +' <span style="font-size:11px;color:#888;font-family:IBM Plex Sans,sans-serif"> · '+rv.title_en+'</span></div>'
      +'<div style="display:flex;gap:5px">'
      +'<span style="font-size:10px;padding:2px 9px;background:'+bg+';color:'+col+';font-weight:600">'+dl[s].ar+'</span>'
      +'<span style="font-size:10px;padding:2px 9px;background:'+bg+';color:'+col+';font-weight:500;font-family:IBM Plex Sans,sans-serif">'+dl[s].en+'</span>'
      +'</div></div>'
      +'<div style="padding:10px 12px;background:#FAFAFA;border:.5px solid #E0E0DE;border-right:3px solid '+col+';font-size:12px;line-height:1.85;color:#2a2a28;direction:rtl">'+rv.note_ar+'</div>'
      +'<div style="padding:8px 12px;background:#F5F4F2;border:.5px solid #E0E0DE;border-top:none;border-right:3px solid '+col+';font-size:11px;line-height:1.8;color:#555;font-family:IBM Plex Sans,sans-serif;direction:ltr;text-align:left">'+rv.note_en+'</div>'
      +(rv.detail?'<div style="padding:7px 10px;background:#EFEFED;border:.5px solid #E0E0DE;border-top:none;font-size:10px;color:#777;font-family:monospace;direction:ltr;text-align:left">'+rv.detail+'</div>':'')
      +'</div>';
  }).join('');

  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>Brand Review — '+d.project+'</title>'
    +'<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"IBM Plex Sans Arabic","IBM Plex Sans",sans-serif;color:#1e1e1c;background:#fff;direction:rtl;padding:40px;font-size:12px;line-height:1.6}@media print{body{padding:18mm}.np{display:none!important}@page{margin:12mm;size:A4}}</style>'
    +'</head><body>'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:16px;border-bottom:1.5px solid #1e1e1c;margin-bottom:20px">'
    +'<div><div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#a3a3a5;margin-bottom:5px">وزارة الصناعة والثروة المعدنية · Ministry of Industry and Mineral Resources</div>'
    +'<div style="font-size:20px;font-weight:700;margin-bottom:2px">تقرير مراجعة الهوية البصرية</div>'
    +'<div style="font-size:13px;color:#555;font-family:IBM Plex Sans,sans-serif;direction:ltr;text-align:left">Brand Identity Review Report</div></div>'
    +'<div style="text-align:left;direction:ltr"><div style="font-size:10px;color:#a3a3a5">'+d.dateEn+'</div><div style="font-size:10px;color:#a3a3a5">'+d.dateAr+'</div></div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin-bottom:20px;border:.5px solid #E0E0DE">'
    +'<div style="padding:10px 14px;border-left:.5px solid #E0E0DE"><div style="font-size:9px;color:#a3a3a5;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">المشروع · Project</div><div style="font-size:12px;font-weight:600">'+d.project+'</div></div>'
    +'<div style="padding:10px 14px;border-left:.5px solid #E0E0DE"><div style="font-size:9px;color:#a3a3a5;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">المراجع · Reviewer</div><div style="font-size:12px;font-weight:600">'+d.reviewer+'</div></div>'
    +'<div style="padding:10px 14px"><div style="font-size:9px;color:#a3a3a5;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">النوع · Type</div><div style="font-size:12px;font-weight:600">'+d.dtype+'</div></div></div>'
    +'<div style="padding:14px 16px;background:'+sbg+';border:.5px solid '+sbr+';margin-bottom:22px">'
    +'<div style="font-size:12px;font-weight:700;color:'+sc+';margin-bottom:5px">'+fails+' مخالفة · '+warns+' تحذير · '+passes+' مطابق</div>'
    +'<div style="font-size:12px;line-height:1.75;color:#2a2a28;margin-bottom:4px">'+r.summary_ar+'</div>'
    +'<div style="font-size:11px;line-height:1.7;color:#555;font-family:IBM Plex Sans,sans-serif;direction:ltr;text-align:left">'+r.summary_en+'</div></div>'
    +'<div style="font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#a3a3a5;border-bottom:.5px solid #E0E0DE;padding-bottom:7px;margin-bottom:16px">نتائج المراجعة · Review Results</div>'
    +crHtml
    +'<div style="margin-top:36px;padding-top:14px;border-top:.5px solid #E0E0DE;display:flex;justify-content:space-between">'
    +'<div style="font-size:10px;color:#a3a3a5">إدارة التصميم والهوية · Design & Identity Department · للاستخدام الداخلي · Internal Use Only</div>'
    +'<div style="font-size:10px;color:#a3a3a5;font-family:IBM Plex Sans,sans-serif;direction:ltr">'+d.dateEn+'</div></div>'
    +'<div class="np" style="margin-top:32px;text-align:center"><button onclick="window.print()" style="background:#1e1e1c;color:#fff;border:none;padding:12px 32px;font-size:13px;cursor:pointer">طباعة / حفظ كـ PDF · Print / Save as PDF</button></div>'
    +'</body></html>');
  w.document.close();
  btn.disabled=false;
  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 1v7M3 5.5L6 9l3-3.5"/><path d="M1 9.5v1a.5.5 0 00.5.5h9a.5.5 0 00.5-.5v-1"/></svg>تصدير PDF · Export';
}
</script>
</body>
</html>
